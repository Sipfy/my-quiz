<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>생활과 윤리 독서실</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 600px; min-height: 300px; vertical-align: top; }
        .nav-menu { margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 20px; background: #ddd; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: #4CAF50; color: white; }
        .page { display: none; }
        .page.active { display: block; }
        input { width: 70%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; cursor: pointer; border: 1px solid #eee; border-radius: 8px; background: #fff; text-align: left; }
        .option-btn:hover { background: #f0f0f0; }

        /* 문제 수 선택 영역 */
        #count-select-area { display: none; padding: 20px; background: #fdfdfd; border-radius: 10px; margin-bottom: 20px; border: 2px dashed #4CAF50; }
        .count-btn { padding: 10px 15px; margin: 5px; border: 1px solid #4CAF50; background: white; color: #4CAF50; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .count-btn:hover { background: #4CAF50; color: white; }

        /* 해설 카드 스타일 */
        .review-card { text-align: left; background: #ffffff; border: 1px solid #e1e4e8; border-left: 6px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .exp-btn { background: #f1f3f5; border: 1px solid #dee2e6; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.85em; margin-top: 10px; transition: 0.2s; }
        .explanation-box { display: none; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px inset #eee; line-height: 1.6; font-size: 0.9em; color: #444; }
    </style>
</head>
<body>

<div style="margin-top: 30px; margin-bottom: 25px; text-align: center;">

<script>
    const ADMIN_ID = "doyoon0208";

    const allQuizzes = {
        'part1': [
            { q: "실천 윤리학의 입장으로 가장 적절한 것은? (2021_06)", a: ["윤리학의 핵심 과제는 도덕적 추리와 논증 방법의 연구이다.", "윤리학의 핵심 과제는 도덕적 관행에 대한 인과적 서술이다.", "윤리학의 핵심 과제는 경험적 관행에 대한 연구를 통한 도덕성의 검증이다.", "윤리학의 핵심 과제는 삶의 구체적인 도덕 문제의 해결이다."], cor: 3, info: "실천 윤리학은 이론을 응용하여 현실 문제를 해결하는 것이 핵심입니다." },
            { q: "기술 윤리학의 입장으로 가장 적절한 것은? (2021_09)", a: ["보편적 도덕 원리를 현실의 개별 상황에 적용해야 한다.", "도덕 규칙이나 평가의 표준이 되는 원리를 정립해야 한다.", "도덕 언어의 의미와 도덕 추론의 타당성을 검증해야 한다.", "도덕 관행의 발생 과정을 객관적으로 설명해야 한다."], cor: 3, info: "기술 윤리학은 도덕 현상을 가치중립적으로 기술하고 인과관계를 설명합니다." },
            { q: "메타 윤리학의 입장에서 실천 윤리학에게 할 수 있는 적절한 비판은? (2021_수능)", a: ["도덕 문제 해결보다 도덕 논증의 타당성 분석이 중요함을 간과한다.", "도덕 문제 탐구에 사회, 자연 과학적 지식이 필요함을 간과한다.", "도덕 현상은 과학적으로 기술해야 할 사실의 집합이 아님을 간과한다.", "도덕 이론의 연구만으로는 삶의 구체적 문제 해결에 한계가 있음을 간과한다."], cor: 0, info: "메타 윤리학은 윤리학이 학문적으로 성립 가능한지를 따지는 학문입니다." },
            { q: "규범 윤리학의 입장에서 기술 윤리학에게 할 수 있는 적절한 비판은? (2022_06)", a: ["도덕적 관습을 실증적으로 연구해야 함을 간과한다.", "가치 판단을 위해 도덕 이론을 정립해야 함을 간과한다.", "윤리학이 하나의 학문으로서 성립 가능한지 검토해야 함을 간과한다.", "도덕 언어의 의미 분석을 핵심 과제로 삼아야 한다"], cor: 1, info: "규범 윤리학은 도덕 원리를 세워 행위의 지침을 제공하고자 합니다." },
            { q: "실천, 메타, 이론 윤리학에 대한 설명으로 옳지 않은 것은? (2022_09)", a: ["실천 윤리학의 목적은 도덕 현상의 인과 관계를 기술하는 것이다.", "실천 윤리학은 현실의 윤리 문제 해결을 위해 이론 윤리학을 필요로 한다.", "메타 윤리학은 윤리학이 학문적으로 성립 가능한지 검증하고자 한다.", "이론 윤리학은 윤리 이론을 정립할 때 메타 윤리학의 연구 결과를 활용할 수 있다."], cor: 0, info: "도덕 현상의 인과 관계 기술은 기술 윤리학의 특징입니다." },
            { q: "실천 윤리학의 입장에서 메타 윤리학에게 할 수 있는 적절한 비판은? (2022_수능)", a: ["윤리학의 학문적 성립 가능성에 대한 탐구를 간과한다.", "도덕 판단의 근거가 되는 규범 체계의 필요성을 강조한다.", "현실의 도덕 문제에 윤리 이론을 응용해야 함을 간과한다.", "도덕 현상에 대한 객관적 서술과 인과 관계의 설명을 강조한다."], cor: 2, info: "실천 윤리학은 현실 문제의 해결(응용)을 강조합니다." },
            { q: "메타, 실천 윤리학의 주된 목표로 가장 적절한 것은? (2023_06)", a: ["메타 윤리학 : 인간의 바람직한 삶의 방향을 제시하는 것이다. ", "메타 윤리학 : 도덕적 현상에 대해 객관적으로 기술하는 것이다. ", "실천 윤리학 : 윤리학이 학문으로 성립할 수 있는지 연구하는 것이다.", "실천 윤리학 : 현실의 윤리 문제에 대한 실천적 해결 방안을 모색하는 것이다."], cor: 3, info: "실천 윤리학은 현실 문제의 실천적 해결을 목표로 합니다." },
            { q: "실천 윤리학의 입장에서 기술 윤리학에게 할 수 있는 적절한 비판은? (2023_09)", a: ["도덕 언어에 함축된 의미 분석이 윤리학의 주된 목적임을 간과한다", "도덕 관행의 발생 과정을 객관적으로 설명해야 함을 간과한다", "도덕 추론을 위해 어떠한 사실적 지식도 필요하지 않음을 간과한다.", "도덕 문제를 해결하기 위해 실천적 지침을 제공해야 함을 간과한다"], cor: 3, info: "기술 윤리학은 사실을 기술할 뿐 가치 판단이나 지침 제공에 소홀할 수 있습니다." },
            { q: "실천 윤리학의 입장에서 기술 윤리학에게 할 수 있는 적절한 비판은? (2023_수능)", a: ["도덕적 담론의 논증 구조에 대한 논리적 분석을 강조한다.", "도덕 판단의 표준에 대한 체계적인 이론의 정립을 강조한다.", "도덕적으로 바람직한 삶의 이상에 대한 규범적 탐구를 간과한다.", "도덕적 딜레마 해결을 위해 타 학문과의 학제적 연구를 강조한다."], cor: 2, info: "기술 윤리학은 규범적 탐구(무엇이 옳은가)를 하지 않습니다." },
            { q: "규범 윤리학의 입장에서 기술 윤리학에게 할 수 있는 적절한 비판은? (2024_06)", a: ["도덕적 담론에서 논리적 추론의 타당성 검증을 강조한다.", "도덕적 진술을 구성하는 도덕적 언어의 의미 분석을 강조한다.", "올바른 행위 지침을 제공하는 규범적 탐구의 중요성을 간과한다.", "윤리학의 학문적 성립 가능성에 대한 비판적 검토를 강조한다"], cor: 2, info: "규범 윤리학은 행위의 지침을 제공하는 역할을 합니다." },
            { q: "메타, 실천 윤리학의 핵심 과제로 가장 적절한 것은? (2024_09)", a: ["메타 윤리학 : 도덕 현상을 가치 평가 없이 객관적으로 서술하는 것이다.", "메타 윤리학 : 도덕적 행위의 근거가 되는 도덕 원리를 정립하는 것이다.", "실천 윤리학 : 윤리학의 학문적 성립 가능성을 논리적으로 탐구하는 것이다.", "실천 윤리학 : 구체적인 윤리 문제에 대한 해결 방안을 모색하는 것이다."], cor: 3, info: "실천 윤리학은 구체적 문제 해결 방안을 모색합니다." },
            { q: "이론, 메타 윤리학의 핵심 과제로 가장 적절한 것은? (2024_수능)", a: ["이론 윤리학 : 도덕적 삶의 지침이 되는 보편적 원리를 제시하는 것이다.", "이론 윤리학 : 도덕 현상 간의 인과 관계를 가치중립적으로 설명하는 것이다.", "메타 윤리학 : 학제적 연구 방법으로 실생활의 도덕 문제를 해결하는 것이다.", "메타 윤리학 : 각 사회의 다양한 도덕적 관습을 객관적으로 기술하는 것이다"], cor: 0, info: "이론 윤리학은 보편적 도덕 원리를 정립하는 것을 목표로 합니다." }
        ],
        'part2': [{ q: "동서양 윤리 문제 접근 원본 문항", a: ["정답", "오답"], cor: 0, info: "해설" }]
    };

    let tempCategory = "";
    let selectedQuiz = []; 
    let currentIdx = 0;
    let score = 0;
    let quizHistory = [];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-btn-' + pageId).classList.add('active');
    }

    function selectCount(category, name) {
        tempCategory = category;
        document.getElementById('quiz-category-menu').style.display = 'none';
        document.getElementById('count-select-area').style.display = 'block';
        document.getElementById('selected-part-name').innerText = `📂 ${name}`;
    }

    function cancelSelect() {
        document.getElementById('quiz-category-menu').style.display = 'block';
        document.getElementById('count-select-area').style.display = 'none';
    }

    function startQuiz(count) {
        let rawData = allQuizzes[tempCategory] || [];
        if (rawData.length === 0) { alert("문제가 없습니다."); return; }
        
        let shuffled = [...rawData].sort(() => Math.random() - 0.5);
        selectedQuiz = shuffled.slice(0, count);
        
        currentIdx = 0; score = 0; quizHistory = [];
        document.getElementById('count-select-area').style.display = 'none';
        document.getElementById('quiz-game-area').style.display = 'block';
        document.getElementById("quiz-area").style.display = "block";
        document.getElementById("result-area").style.display = "none";
        loadQuiz();
    }

    function loadQuiz() {
        const qElem = document.getElementById("question");
        const oElem = document.getElementById("options");
        oElem.innerHTML = "";
        const data = selectedQuiz[currentIdx];
        qElem.innerHTML = data.q;

        data.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => {
                const isCorrect = (i === data.cor);
                if(isCorrect) score++;
                quizHistory.push({
                    q: data.q, user: opt, correct: data.a[data.cor],
                    info: data.info || "해설 생략", isCorrect: isCorrect
                });
                currentIdx++;
                if(currentIdx < selectedQuiz.length) loadQuiz();
                else showResult();
            };
            oElem.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("quiz-area").style.display = "none";
        document.getElementById("result-area").style.display = "block";
        document.getElementById("score-text").innerText = `${selectedQuiz.length}문제 중 ${score}개 정답!`;

        let reviewHtml = "<h3 style='margin-top:30px;'>📋 전 문항 결과 및 해설</h3>";
        quizHistory.forEach((item, idx) => {
            const borderColor = item.isCorrect ? "#2ecc71" : "#ff5252";
            reviewHtml += `
                <div class="review-card" style="border-left-color: ${borderColor}">
                    <div><b>${idx+1}. ${item.isCorrect ? '✅':'❌'} ${item.q}</b></div>
                    <div style="margin-top:8px; font-size: 0.9em;">
                        <span style="color:${item.isCorrect ? '#2ecc71' : '#ff5252'}">나의 답: ${item.user}</span> | 
                        <span style="color:#4CAF50;">정답: ${item.correct}</span>
                    </div>
                    <button class="exp-btn" id="btn-${idx}" onclick="toggleExp(${idx})">🔽 해설 보기</button>
                    <div id="exp-${idx}" class="explanation-box"><b>💡 해설:</b><br>${item.info}</div>
                </div>`;
        });
        document.getElementById("review-zone").innerHTML = reviewHtml;
    }

    function toggleExp(idx) {
        const box = document.getElementById(`exp-${idx}`);
        const btn = document.getElementById(`btn-${idx}`);
        if (box.style.display === "none" || box.style.display === "") {
            box.style.display = "block";
            btn.innerText = "🔼 해설 접기";
        } else {
            box.style.display = "none";
            btn.innerText = "🔽 해설 보기";
        }
    }

    function unlockAdmin() {
        const id = document.getElementById("adminId").value;
        const pw = document.getElementById("adminPw").value;
        if (id === ADMIN_ID && pw === ADMIN_PW) {
            document.getElementById("admin-login").style.display = "none";
            document.getElementById("admin-data").style.display = "block";
        } else { alert("인증 실패!"); }
    }
</script>
