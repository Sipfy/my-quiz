<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>생활과 윤리 개념 정리 퀴즈</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f9; }
        #quiz-container { background: white; padding: 30px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); display: inline-block; width: 80%; max-width: 500px; }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 10px; cursor: pointer; border: 1px solid #ddd; border-radius: 5px; background: #fff; transition: 0.3s; }
        .option-btn:hover { background: #e2e2e2; }
        #result { font-size: 24px; font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="question-area">
        <h2 id="question">질문이 여기에 표시됩니다.</h2>
        <div id="options"></div>
    </div>
    <div id="result-area" style="display:none;">
        <h2>결과</h2>
        <p id="result"></p>
        <button onclick="location.reload()">다시 풀기</button>
    </div>
</div>

<script>
    const quizData = [
        { q: "<교정적 정의><br><br>다음을 주장한 사상가는?<br>형벌은 사람들이 유사한 범죄 행위를 하지 못 하도록 억제하는 것이다. 범죄에 대한 억제력의 측면에서 사형보다 종신 노역형이 더 효과적이다.", a: ["칸트", "루소", "베카리아", "벤담"], cor: 3 },
        { q: "인공지능 제미나이(Gemini)의 개발사는?", a: ["애플", "구글", "마이크로소프트", "메타"], cor: 1 },
        { q: "10 + 10은?", a: ["10", "20", "30", "1010"], cor: 1 }
    ];

    let currentIdx = 0;
    let score = 0;

    function loadQuiz() {
        const qElem = document.getElementById("question");
        const oElem = document.getElementById("options");
        oElem.innerHTML = "";

        qElem.innerText = quizData[currentIdx].q;
        quizData[currentIdx].a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(i);
            oElem.appendChild(btn);
        });
    }

    function checkAnswer(chosen) {
        if (chosen === quizData[currentIdx].cor) score++;
        currentIdx++;
        if (currentIdx < quizData.length) loadQuiz();
        else showResult();
    }

    function showResult() {
        document.getElementById("question-area").style.display = "none";
        document.getElementById("result-area").style.display = "block";
        document.getElementById("result").innerText = `${quizData.length}문제 중 ${score}문제 정답!`;
    }

    loadQuiz();
</script>
</body>
</html>
