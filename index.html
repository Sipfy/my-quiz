<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>생활과 윤리 독서실</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 600px; min-height: 300px; vertical-align: top; }
        .nav-menu { margin-bottom: 20px; }
        .nav-btn { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 20px; background: #ddd; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { background: #4CAF50; color: white; }
        .page { display: none; }
        .page.active { display: block; }
        input { width: 70%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .option-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; cursor: pointer; border: 1px solid #eee; border-radius: 8px; background: #fff; text-align: left; }
        .option-btn:hover { background: #f0f0f0; }

        /* 문제 수 선택 화면 스타일 */
        #count-select-area { display: none; padding: 20px; background: #f9f9f9; border-radius: 10px; margin-bottom: 20px; border: 2px dashed #bbb; }
        .count-btn { padding: 10px 15px; margin: 5px; border: 1px solid #4CAF50; background: white; color: #4CAF50; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .count-btn:hover { background: #4CAF50; color: white; }

        /* 해설 카드 스타일 */
        .review-card { text-align: left; background: #ffffff; border: 1px solid #e1e4e8; border-left: 6px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .exp-btn { background: #f1f3f5; border: 1px solid #dee2e6; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-size: 0.85em; margin-top: 10px; }
        .explanation-box { display: none; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 10px; border: 1px inset #eee; line-height: 1.6; font-size: 0.9em; }
    </style>
</head>
<body>

<div style="margin-top: 30px; margin-bottom: 25px; text-align: center;">
    <img src="./images/grok-image-3aad52e0-4a17-4371-9beb-ede7233f6ce2.png" alt="내 프로필 사진" style="width: 100%; max-width: 450px; height: auto; border-radius: 8px;">
    <h1 style="margin-top: 18px; color: #333; font-size: 28px;">📚 생활과 윤리 독서실</h1>
</div>

    <div class="nav-menu">
        <button class="nav-btn active" onclick="showPage('quiz-page')">🎮 생윤 문항 풀이</button>
        <button class="nav-btn" onclick="showPage('admin-page')">👨‍💻 개발자 페이지</button>
    </div>

    <div id="quiz-page" class="page active">
        <div class="container">
            <div id="quiz-category-menu">
                <h2>🎮 단원 선택</h2>
                <button class="nav-btn" style="background:#4A90E2; color:white;" onclick="selectCount('part1')">윤리학의 분류</button>
                <button class="nav-btn" style="background:#F5A623; color:white;" onclick="selectCount('part2')">동서양 윤리 문제 접근</button>
                </div>

            <div id="count-select-area">
                <h3 id="selected-part-name">단원을 선택하셨습니다.</h3>
                <p>몇 문제를 푸시겠습니까?</p>
                <button class="count-btn" onclick="startQuiz(5)">5문제</button>
                <button class="count-btn" onclick="startQuiz(10)">10문제</button>
                <button class="count-btn" onclick="startQuiz(15)">15문제</button>
                <button class="count-btn" onclick="startQuiz(20)">20문제 (전체)</button>
                <br>
                <button onclick="cancelSelect()" style="margin-top:15px; background:none; border:none; color:#999; text-decoration:underline; cursor:pointer;">취소하기</button>
            </div>

            <div id="quiz-game-area" style="display:none;">
                <div id="quiz-area">
                    <h2 id="question">질문 로딩 중...</h2>
                    <div id="options"></div>
                </div>
                <div id="result-area" style="display:none;">
                    <h2>🎉 학습 결과</h2>
                    <p id="score-text" style="font-size:24px; font-weight:bold; color:#4CAF50;"></p>
                    <div id="review-zone"></div>
                    <button onclick="location.reload()" class="nav-btn active" style="margin-top:20px;">다른 단원 풀기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="admin-page" class="page">...</div>

<script>
    const allQuizzes = {
        'part1': [
            { q: "실천 윤리학의 입장으로 적절한 것은?", a: ["답1", "답2", "답3", "정답"], cor: 3, info: "해설내용..." },
            // 여기에 문제를 20개까지 쭉 넣으시면 됩니다.
        ],
        'part2': [ /* ... */ ]
    };

    let tempCategory = ""; // 잠시 카테고리를 저장할 변수
    let selectedQuiz = []; 
    let currentIdx = 0;
    let score = 0;
    let quizHistory = [];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // [추가] 단원을 먼저 고르고 문제 수를 묻는 단계
    function selectCount(category) {
        tempCategory = category;
        document.getElementById('quiz-category-menu').style.display = 'none';
        document.getElementById('count-select-area').style.display = 'block';
        document.getElementById('selected-part-name').innerText = `[${category}] 선택 완료`;
    }

    function cancelSelect() {
        document.getElementById('quiz-category-menu').style.display = 'block';
        document.getElementById('count-select-area').style.display = 'none';
    }

    // [수정] 사용자가 선택한 숫자만큼만 문제를 자름
    function startQuiz(count) {
        let rawData = allQuizzes[tempCategory] || [];
        if (rawData.length === 0) { alert("문제가 없습니다."); return; }
        
        // 1. 전체 문제를 랜덤하게 섞음
        let shuffled = [...rawData].sort(() => Math.random() - 0.5);
        
        // 2. 사용자가 선택한 개수만큼만 자름 (데이터보다 요청수가 많으면 전체 출력)
        selectedQuiz = shuffled.slice(0, count);
        
        currentIdx = 0; score = 0; quizHistory = [];

        document.getElementById('count-select-area').style.display = 'none';
        document.getElementById('quiz-game-area').style.display = 'block';
        document.getElementById("quiz-area").style.display = "block";
        document.getElementById("result-area").style.display = "none";
        loadQuiz();
    }

    function loadQuiz() {
        const qElem = document.getElementById("question");
        const oElem = document.getElementById("options");
        oElem.innerHTML = "";
        const data = selectedQuiz[currentIdx];
        qElem.innerHTML = data.q;

        data.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => {
                const isCorrect = (i === data.cor);
                if(isCorrect) score++;
                quizHistory.push({
                    question: data.q, userChoice: opt, correctAnswer: data.a[data.cor],
                    explanation: data.info || "해설이 없습니다.", isCorrect: isCorrect
                });
                currentIdx++;
                if(currentIdx < selectedQuiz.length) loadQuiz();
                else showResult();
            };
            oElem.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("quiz-area").style.display = "none";
        document.getElementById("result-area").style.display = "block";
        document.getElementById("score-text").innerText = `${selectedQuiz.length}문제 중 ${score}개 정답!`;

        let reviewHtml = "<h3 style='margin-top:30px;'>📖 전체 문항 해설</h3>";
        quizHistory.forEach((item, idx) => {
            const borderColor = item.isCorrect ? "#2ecc71" : "#ff5252";
            reviewHtml += `
                <div class="review-card" style="border-left-color: ${borderColor}">
                    <div><b>${idx + 1}. ${item.question}</b></div>
                    <div style="margin-top:8px; font-size: 0.9em;">
                        <span style="color:${item.isCorrect ? '#2ecc71' : '#ff5252'}">나의 답: ${item.userChoice}</span> | 
                        <span style="color:#4CAF50;">정답: ${item.correctAnswer}</span>
                    </div>
                    <button class="exp-btn" onclick="toggleExp(${idx})">🔽 해설 보기</button>
                    <div id="exp-${idx}" class="explanation-box"><b>💡 해설:</b><br>${item.explanation}</div>
                </div>`;
        });
        document.getElementById("review-zone").innerHTML = reviewHtml;
    }

    function toggleExp(idx) {
        const box = document.getElementById(`exp-${idx}`);
        box.style.display = (box.style.display === "block") ? "none" : "block";
    }
</script>
</body>
</html>
