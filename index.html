            { q: "윤리학의 분류 <br><br> 기술 윤리학의 입장으로 가장 적절한 것은? (2021_09)", a: ["보편적 도덕 원리를 현실의 개별 상황에 적용해야 한다.", "도덕 규칙이나 평가의 표준이 되는 원리를 정립해야 한다.", "도덕 언어의 의미와 도덕 추론의 타당성을 검증해야 한다.", "도덕 관행의 발생 과정을 객관적으로 설명해야 한다."], cor: 3 }
        ],
        'part2': [
            { q: "대한민국의 수도는?", a: ["서울", "부산", "인천"], cor: 0 }
        ],
        'part2': [

        ],

        ],

        ],
        
    };

    let selectedQuiz = []; 
    let currentIdx = 0;
    let score = 0;

    // --- 페이지/탭 전환 기능 ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        if(event) event.currentTarget.classList.add('active');
    }

    function showSubPage(subId) {
        document.querySelectorAll('.sub-page').forEach(page => page.style.display = 'none');
        document.getElementById(subId).style.display = 'block';
    }

    // --- 로그인 기능 (수정 완료) ---
    function unlockAdmin() {
        // 각각의 입력창에서 값을 가져옵니다.
        const idInput = document.getElementById("adminId").value;
        const pwInput = document.getElementById("adminPw").value;

        // 설정된 상수(ADMIN_ID, ADMIN_PW)와 비교합니다.
        if (idInput === ADMIN_ID && pwInput === ADMIN_PW) {
            document.getElementById("admin-login").style.display = "none";
            document.getElementById("admin-data").style.display = "block";
        } else {
            alert("권한이 없습니다.");
        }
    }

    // --- 퀴즈 실행 로직 ---
    function startQuiz(category) {
        selectedQuiz = allQuizzes[category];
        currentIdx = 0; score = 0;
        document.getElementById('quiz-category-menu').style.display = 'none';
        document.getElementById('quiz-game-area').style.display = 'block';
        loadQuiz();
    }

    function loadQuiz() {
        const qElem = document.getElementById("question");
        const oElem = document.getElementById("options");
        oElem.innerHTML = "";
        const data = selectedQuiz[currentIdx];
        qElem.innerHTML = data.q;
        data.a.forEach((opt, i) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = () => {
                if(i === data.cor) score++;
                currentIdx++;
                if(currentIdx < selectedQuiz.length) loadQuiz();
                else showResult();
            };
            oElem.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById("quiz-area").style.display = "none";
        document.getElementById("result-area").style.display = "block";
        document.getElementById("score-text").innerText = `${selectedQuiz.length}문제 중 ${score}개 정답!`;
    }
